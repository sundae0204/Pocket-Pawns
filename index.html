<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>口袋棋兵 Pocket Chess Soldiers</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="themes/custom.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
    <script>
      window.POCKET_PAWNS_SUPABASE_URL = "https://gnacikhtarwihgruuerg.supabase.co";
      window.POCKET_PAWNS_SUPABASE_ANON_KEY = "sb_publishable_pXjLMjvS137qZQzEIGiQXQ_zKcGF52P";
    </script>
    <script src="supabase.js"></script>
    <script src="characters.js"></script>
  </head>
  <body>
    <!-- Floating speech bubbles -->
    <!-- 對話氣泡掛在 body，避免 .stage-band transform 使 fixed 失效而被角色／比數擋住 -->
    <div class="speech-bubble speech-bubble--enemy" id="enemy-speech-bubble" hidden>
      <p class="speech-bubble-text" id="enemy-speech-text"></p>
    </div>
    <div class="speech-bubble speech-bubble--player" id="player-speech-bubble" hidden>
      <p class="speech-bubble-text" id="player-speech-text"></p>
    </div>
    <template id="npc-dialog-template">
      <img class="character-select-npc-face" src="" alt="" width="203" height="239" decoding="async" />
      <div class="character-select-npc-text">
        <div class="character-select-npc-title">
          <span class="character-select-npc-name">朵雲公主</span>
          <span class="character-select-npc-tag" aria-hidden="true">嚮導</span>
        </div>
        <p class="npc-message character-select-npc-message" aria-live="polite"></p>
      </div>
    </template>
    <template id="action-button-template">
      <button type="button"></button>
    </template>

    <!-- Title / meta screens -->
    <div id="title-screen" class="overlay-screen overlay-title-screen" aria-label="標題畫面">
      <div class="overlay-inner title-inner">
        <div class="title-logo-wrap">
          <img
            class="title-logo-img"
            src="assets/logo.png"
            alt="口袋棋兵 Pocket Chess Soldiers"
            width="640"
            decoding="async"
          />
        </div>
        <div
          class="title-actions"
          data-action-buttons="title-btn-play|title-btn title-btn-primary|開始遊玩;title-btn-credits|title-btn|製作名單;title-btn-artcard|title-btn|創作家角色卡"
        ></div>
      </div>
    </div>

    <div id="credits-screen" class="overlay-screen" hidden aria-label="製作名單">
      <div class="overlay-inner credits-inner">
        <div class="character-select-list-panel credits-list-panel">
          <h2 class="overlay-title" id="credits-title">芭塔塔王國 開發團隊</h2>
          <div class="credits-body">
            <p>朵雲公主雲姬：嚮導，叭啦叭啦</p>
            <p>
              紅妻：總建築師暨宮廷畫師，美術、企劃、雜質音效、跟 AI 吵架（寫程式）的負責人
            </p>
            <p>親王：首席宮廷樂長，提供高品質 BGM</p>
            <p>遊蕩的棋兵團，不定期出沒，但每次出現都能讓專案多活幾天</p>
            <p>特別鳴謝：那些在開發過程中提供意見的玩家（還有我的咖啡機）</p>
            <p>
              感謝所有在百忙之中，隨緣、隨喜加入協助的小夥伴。你們的每一份零碎時間，都是這款遊戲誕生的養分。
            </p>
          </div>
        </div>
        <div
          class="credits-footer-actions"
          data-action-buttons="credits-btn-back|character-select-back-btn|返回"
        ></div>
      </div>
    </div>

    <!-- Character select / detail -->
    <div id="character-select" class="overlay-screen overlay-character-select" hidden aria-label="角色選擇">
      <div class="overlay-inner character-select-inner">
        <div class="character-select-list-panel" aria-label="角色清單">
          <header class="character-select-header">
            <h1 class="overlay-title character-select-title"></h1>
            <div class="stat-sort-wrap" aria-label="屬性排序">
              <div class="stat-sort-row" data-stat-sort-row data-stats="STR,INT,DEX,AGI,VIT,LUK"></div>
            </div>
          </header>
          <div class="character-scroll-outer">
            <div id="character-strip" class="character-strip"></div>
          </div>
        </div>

        <footer class="character-select-footer" aria-label="角色選擇操作">
          <div
            class="character-select-npc npc-shell"
            aria-label="朵雲公主對話"
            data-face-id="character-select-npc-face"
            data-message-id="character-select-npc-message"
          ></div>
          <div data-action-buttons="btn-character-back|character-select-back-btn|返回標題"></div>
        </footer>
      </div>
    </div>

    <div id="character-detail" class="overlay-screen overlay-character-select" hidden aria-label="角色詳情">
      <div class="overlay-inner character-detail-inner">
        <div class="character-select-list-panel character-detail-panel" aria-label="角色詳情內容">
          <div class="character-detail-layout">
            <div class="character-detail-left">
              <div id="character-detail-portrait" class="character-detail-portrait" aria-hidden="true"></div>
            </div>
            <div class="character-detail-right">
              <h2 id="character-detail-name" class="character-detail-name"></h2>
              <p class="character-detail-menu-dlg" id="character-detail-menu-dlg" hidden></p>
              <div id="character-detail-stats" class="character-detail-stats"></div>
              <div class="character-detail-meta" id="character-detail-meta" aria-live="polite"></div>
            </div>
          </div>
        </div>

        <footer class="character-select-footer character-detail-footer" aria-label="角色詳情操作">
          <div
            class="character-select-npc npc-shell"
            aria-label="朵雲公主對話"
            data-face-id="character-detail-npc-face"
            data-message-id="character-detail-npc-message"
          ></div>
          <div
            class="character-detail-footer-actions"
            data-action-buttons="character-detail-back|character-select-back-btn|返回;character-detail-confirm|Btn character-detail-confirm-btn|確定|確定"
          ></div>
        </footer>
      </div>
    </div>

    <!-- In-battle overlays -->
    <div id="menu-overlay" class="overlay-screen overlay-menu" hidden aria-modal="true" role="dialog" aria-labelledby="menu-panel-title">
      <div class="menu-panel">
        <h3 class="menu-panel-title" id="menu-panel-title">系統</h3>
        <div data-action-buttons="menu-btn-close|settlement-btn|關閉;menu-btn-quit-battle|settlement-btn menu-quit|退出戰鬥"></div>
      </div>
    </div>

    <div id="settlement" class="overlay-screen overlay-settlement" hidden aria-modal="true" role="dialog" aria-labelledby="settlement-ending">
      <div class="overlay-inner settlement-inner">
        <div id="settlement-ending" class="settlement-ending"></div>
        <div id="settlement-details" class="settlement-details" hidden></div>
        <div id="settlement-record" class="settlement-record" hidden>
          <p class="settlement-record-hint">你打破了連擊紀錄！輸入你的名稱，讓大家記住你。</p>
          <input type="text" id="settlement-record-input" class="settlement-record-input" maxlength="32" placeholder="輸入 2~32 字元" autocomplete="off" />
          <div data-action-buttons="settlement-btn-record|settlement-btn primary|提交名稱"></div>
        </div>
        <div data-action-buttons="settlement-btn-back|character-select-back-btn|返回標題"></div>
      </div>
    </div>

    <div id="screen-curtain" class="screen-curtain" hidden aria-hidden="true"></div>

    <!-- Core battle viewport -->
    <div class="viewport-16x9" id="viewport" hidden aria-label="戰鬥畫面">
      <div class="game-root" id="game-root">
        <header class="top-bar">
          <div class="enemy-hud">
            <div class="enemy-stats stat-row" id="enemy-stats" aria-label="敵方屬性"></div>
            <div class="hearts" id="enemy-hearts" aria-label="敵方 HP"></div>
          </div>
          <div class="top-bar-right">
            <div class="battle-context-panel" id="battle-context-panel" aria-label="戰場資訊">
              <div class="field-label" id="field-label" aria-live="polite"></div>
              <div class="phase-badge" id="phase-badge" aria-live="polite">玩家攻擊階段</div>
            </div>
            <div data-action-buttons="btn-menu|menu-btn Btn character-detail-confirm-btn|系統"></div>
          </div>
        </header>

        <main class="stage">
          <div class="stage-band" id="stage-band">
            <div class="fighter enemy-fighter" id="enemy-sprite">
              <div class="sprite sprite-enemy" aria-hidden="true"></div>
            </div>

            <div class="fighter player-fighter" id="player-sprite">
              <div class="sprite sprite-player" aria-hidden="true"></div>
            </div>

            <span class="fighter-label fighter-label--enemy" id="enemy-fighter-label"></span>
            <span class="fighter-label fighter-label--player" id="player-fighter-label"></span>

            <div class="clash-numbers" id="clash-numbers" aria-hidden="true">
              <div class="clash-num clash-num--enemy"><span class="clash-num-line" id="clash-enemy-val">0</span></div>
              <div class="clash-num clash-num--player"><span class="clash-num-line" id="clash-player-val">0</span></div>
            </div>
          </div>
        </main>

        <aside class="npc-panel" id="npc-panel">
          <div class="character-select-npc npc-shell" aria-label="朵雲公主對話" data-face-id="npc-face" data-message-id="npc-message"></div>
        </aside>

        <section class="player-panel">
          <div class="hearts player-hearts" id="player-hearts" aria-label="玩家 HP"></div>
          <div class="player-stats stat-row" id="player-stats" aria-label="玩家屬性"></div>
          <div class="cards-deck" role="group" aria-label="手牌">
            <div class="value-cards" id="value-cards"></div>
            <div class="special-column" id="special-column" aria-label="特殊卡"></div>
          </div>
        </section>

        <div class="combat-banner" id="combat-banner" aria-live="polite" hidden></div>
      </div>
    </div>

    <script src="dialogueData.js"></script>
    <script src="audio-manager.js"></script>
    <script src="miss-cloudy-data.js"></script>
    <script src="heartfx-atlas.js"></script>
    <script src="battlefx-atlas.js"></script>
    <script src="game_card.js"></script>
  </body>
</html>
